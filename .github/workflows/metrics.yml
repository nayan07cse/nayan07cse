name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Main metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nayan07cse
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Amsterdam

      - name: Full-year isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nayan07cse
          filename: metrics.plugin.isocalendar.fullyear.svg
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Amsterdam

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nayan07cse
          filename: metrics.plugin.languages.svg
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_other: yes

      - name: Lines of code pushed
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nayan07cse
          filename: metrics.plugin.lines.svg
          template: classic
          base: ""
          plugin_lines: yes
          plugin_lines_delay: 30
          plugin_lines_sections: repositories, history
          plugin_lines_repositories_limit: 4
          plugin_lines_history_limit: 2
          plugin_lines_repositories_field: name
          plugin_lines_repositories_sort: lines

      - name: Recently starred repositories
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nayan07cse
          filename: metrics.plugin.stars.svg
          template: classic
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 3

      - name: Featured repositories
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: nayan07cse
          filename: metrics.plugin.repositories.svg
          template: classic
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 2
          plugin_repositories_starred: 2
          plugin_repositories_order: pinned, starred
